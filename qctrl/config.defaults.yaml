# qctrl configuration
# Reference configuration for Quake 2 server management

server:
  host: noir.lan        # RCON server hostname
  port: 27910           # RCON UDP port
  rcon_password: ace123 # Server RCON password

paths:
  server_cfg: /mnt/noir/scratch/games/q2/baseq2/server.cfg
  baseq2: /mnt/noir/scratch/games/q2/baseq2

# Background status polling. Optional — these are the defaults.
poll:
  # Connectionless (OOB) status query interval. This costs the RCON rate limit
  # nothing: the server meters it under sv_status_limit (default 15/sec), not
  # sv_rcon_limit (default 1/sec).
  #
  # It is also the accuracy bound on the map countdown. A Q2 server does not
  # expose elapsed map time, so qctrl infers it by noticing the map name change
  # — which it can only do as fast as it polls.
  status_interval_ms: 1000

  # RCON `status` is still needed for client numbers and addresses (the OOB
  # reply carries neither), but only as a slow identity table. A newly connected
  # player triggers an early refresh, so this is just the backstop.
  rcon_identity_interval_ms: 30000

  # NOTE: qctrl used to also manage an `sv_uptime` cvar here, to catch a server restart
  # onto the *same* map (which changes no map name, so nothing else notices). It has been
  # RETIRED — yquake2 has no such cvar at all, so `Cvar_Set` merely created an inert one
  # that nothing read, and we were writing junk to the server and then detecting that it
  # had done nothing. Do not bring it back. A same-map restart is now caught either by the
  # `frames:` beacon below (measured, ~1s) or by the sv_maplist watchdog (inferred, ~60s).

# ── Serverframe beacon — optional exact map clock (Plan 13) ────────────────────
# OFF by default. Omit this block and nothing changes.
#
# A Q2 server never tells qctrl how long the current map has been running: neither
# RCON nor the connectionless status query carries a match clock. So by default
# qctrl INFERS it — poll the map name, watch for it to change. That has two holes it
# cannot close: start qctrl mid-map and the elapsed time is unknowable forever, and
# a restart onto the SAME map changes no name, so the countdown keeps running and is
# silently wrong.
#
# But the server does broadcast the number — to its CLIENTS. yquake2 zeroes
# `sv.framenum` on every map spawn and ticks it at exactly 10 Hz, sending it to every
# connected client every frame. So `serverframe / 10` IS the age of the running map.
# qctrl has no client. qbots has up to 32 of them, already decoding this exact field.
#
# Point this at qbots' `beacon.socket_path` (set `beacon.enabled: true` on its side)
# and the map clock stops being a guess. Requires qbots on the SAME HOST.
#
# frames:
#   socket_path: /tmp/qbots-beacon.sock   # empty (default) = feature off
#   require_server_match: true            # ignore beacons about a DIFFERENT server —
#                                         #   a fleet pointed at a test box would
#                                         #   otherwise drive this countdown with a
#                                         #   foreign map's age, and look healthy doing
#                                         #   it. Leave this on.
#   reconnect_min_ms: 500                 # backoff floor (qbots may start after qctrl)
#   reconnect_max_ms: 10000               # backoff ceiling
