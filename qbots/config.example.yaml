# qbots configuration — TEMPLATE.
#
# Copy to `config.yaml` and edit for your machine:
#
#     cp config.example.yaml config.yaml
#
# `config.yaml` is gitignored (it holds machine-specific paths) — never commit it.
# All values below are DUMMIES; replace them. Commented lines show the default a
# field falls back to when omitted.

# ── Server to connect the bots to ──────────────────────────────────────────────
server:
  host: q2.example.com    # server hostname or IP (DNS-resolved at connect)
  port: 27910             # Q2 server port (stock default 27910)

# ── On-disk Quake 2 data ───────────────────────────────────────────────────────
# A local mount/copy of the server's `baseq2` dir — qbots reads `.bsp` maps from it
# (loose files *and* inside pak0..pak9 archives) to build the world model.
paths:
  # `server.cfg` is the SERVER's config (rcon password, hostname, maps…). qbots
  # only references the path; it does NOT parse or send it — that's qctrl's job.
  # Keep any real rcon password out of this repo.
  server_cfg: /path/to/quake2/baseq2/server.cfg
  baseq2: /path/to/quake2/baseq2

# ── Fleet roster — `qbots run` spawns this many bots ───────────────────────────
# Omit the whole block to disable the fleet (then use `qbots run --count N`).
fleet:
  count: 8                # bots to spawn (default: 0 = fleet disabled)
  # name_prefix: qb       # bots are named <prefix>0, <prefix>1, … (default: qb)
  # qport_base: 28000     # bot i uses qport_base + i; must be distinct (default: 28000)
  # connect_stagger_ms: 250  # delay between connects, ms (default: 250)
  # reconnect: true       # restart a bot that drops, with backoff (default: true)
  # max_reconnects: 0     # cap reconnect attempts; 0 = unlimited (default: 0)
  # max_bots: 0           # hard cap regardless of count; 0 = uncapped (default: 0)
                          #   leave server maxclients headroom for humans
  # connect_timeout_ms: 10000  # max ms to reach Active before a join fails (default: 10000)
  # stall_timeout_ms: 10000    # max ms Active with no new server frame before the slot
                               #   is presumed dead and the bot re-handshakes (default: 10000)

# ── Serverframe beacon — optional feed for qctrl (Plan 66) ─────────────────────
# The Q2 server zeroes `sv.framenum` on every map spawn and ticks it at 10 Hz, and
# sends it to every connected client — so `serverframe / 10` IS the age of the running
# map. qctrl can't see it (it only speaks RCON + the connectionless status query), but
# our bots decode it on every frame. This block relays it to qctrl over a unix socket,
# so qctrl gets an exact map clock without connecting a Q2 client of its own.
#
# OFF by default. Omit the whole block and nothing changes: no socket, no task.
# Requires qctrl on the SAME HOST (it's a unix socket), with `frames.socket_path` set
# to the same path on its side.
#
# The fleet coalesces: 32 bots all see frame N, but the socket carries ONE message for
# frame N — the message rate follows server ticks, never bot count.
# beacon:
#   enabled: false                        # (default: false)
#   socket_path: /tmp/qbots-beacon.sock   # qbots listens; qctrl connects (default: this)
                                          #   NOTE: under systemd `PrivateTmp=`, /tmp is NOT
                                          #   shared between units — use /run/qbots/ instead.
#   publish_interval_ms: 1000             # heartbeat; a map change publishes IMMEDIATELY
                                          #   regardless, and each line carries `age_ms`, so a
                                          #   slow interval costs resolution, not accuracy.
#   socket_mode: 0o666                    # mode on the socket file (default: 0o666)
#   max_clients: 4                        # concurrent readers (default: 4)
