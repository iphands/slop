# Reverse caching proxy for OS package repositories.
#
# Clients point their repo config at this server; each path prefix maps to a
# real upstream mirror. nginx originates the upstream connection itself (HTTP
# for Debian, HTTPS for Fedora), so it can cache Fedora content that dnf would
# otherwise fetch over TLS+metalink and that a forward proxy could never see.
#
# Caching strategy (correctness-critical):
#   * metadata (Release/InRelease/Packages/repomd.xml/*.xml/by-hash) -> 60s,
#     revalidated cheaply with If-Modified-Since. Serving stale indices causes
#     apt/dnf hash-mismatch errors, so this MUST stay short.
#   * package files (*.deb/*.udeb/*.rpm) -> 365d, they are immutable.

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    # REQUIRED by the dated stats access_log in nginx.conf, and for no other
    # reason. When an access_log path contains a variable, nginx tests the
    # existence of this server's root before every write and SILENTLY SKIPS
    # LOGGING if it is missing -- the only symptom is
    #   [error] testing "/etc/nginx/html" existence failed ... while logging request
    # in the error log, while nginx -t passes and caching works perfectly.
    # The base image has no /etc/nginx/html and nothing here serves files from
    # disk (every location proxies or returns), so without this the stats log is
    # never created. /tmp exists in the image and is uid-agnostic. Verified
    # 2026-07-18; see context/pitfalls.md.
    root /tmp;

    # Expose cache result on every response for easy verification:
    #   curl -sI http://cache:8080/debian/... | grep X-Cache-Status
    add_header X-Cache-Status $upstream_cache_status always;

    # Sane upstream connection defaults (keepalive-friendly, patient on big rpms).
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 15s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Resilience: keep serving the cached copy while revalidating or if the
    # upstream is briefly unreachable.
    proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
    proxy_cache_lock on;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location = / {
        return 200 "package caching proxy: /debian/  /debian-security/  /fedora/\n";
    }

    # ---- Debian main ------------------------------------------------------
    location /debian/ {
        proxy_pass http://deb.debian.org/debian/;
        proxy_cache pkg;
        proxy_cache_valid 200 302 60s;      # metadata
        proxy_cache_valid 404 1m;
        proxy_cache_revalidate on;

        location ~* \.(deb|udeb)$ {
            proxy_pass http://deb.debian.org;   # regex loc: full /debian/... URI passes through
            proxy_cache pkg;
            proxy_cache_valid 200 365d;         # immutable package
        }
    }

    # ---- Debian security --------------------------------------------------
    location /debian-security/ {
        proxy_pass http://security.debian.org/debian-security/;
        proxy_cache pkg;
        proxy_cache_valid 200 302 60s;
        proxy_cache_valid 404 1m;
        proxy_cache_revalidate on;

        location ~* \.(deb|udeb)$ {
            proxy_pass http://security.debian.org;
            proxy_cache pkg;
            proxy_cache_valid 200 365d;
        }
    }

    # ---- Fedora (releases + updates) --------------------------------------
    # /fedora/... on the client maps to /pub/fedora/... on the master mirror.
    # dl.fedoraproject.org is HTTPS; nginx terminates+originates the TLS.
    location /fedora/ {
        proxy_pass https://dl.fedoraproject.org/pub/fedora/;
        proxy_ssl_server_name on;
        proxy_cache pkg;
        proxy_cache_valid 200 302 60s;
        proxy_cache_valid 404 1m;
        proxy_cache_revalidate on;

        location ~* \.rpm$ {
            # regex loc drops the proxy_pass URI, so re-apply the path remap.
            rewrite ^/fedora/(.*)$ /pub/fedora/$1 break;
            proxy_pass https://dl.fedoraproject.org;
            proxy_ssl_server_name on;
            proxy_cache pkg;
            proxy_cache_valid 200 365d;
        }
    }
}
