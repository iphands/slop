# main nginx config for the package caching proxy.
#
# Runs rootless (nginxinc/nginx-unprivileged base): the master listens on a
# high port and ALL writable state lives under the mounted cache volume
# (/var/cache/nginx) or /tmp, so the container works with an arbitrary
# --user ${APP_UID}:${APP_GID} as long as the host cache dir is owned by it.

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log HIT/MISS so `curl -I` and access logs show cache effectiveness.
    log_format cache '$remote_addr [$time_local] "$request" $status '
                     '$body_bytes_sent cache=$upstream_cache_status '
                     'up=$upstream_addr';

    # ---- machine-readable stats log (consumed by the pkgcache-stats service) ----
    #
    # $time_iso8601 is LOCAL time with an offset. Only its DATE is used, and only
    # to name the file -- rotation is implicit, so nginx needs no logrotate and
    # the reader needs no signal. Every timestamp the reader stores comes from
    # $msec (epoch), so the ingest never has to know what timezone nginx thought
    # it was in, and a reader catching up after downtime still lands lines in the
    # right buckets. Rule: the ingest never infers time from a filename.
    map $time_iso8601 $logdate {
        "~^(?<ymd>\d{4}-\d{2}-\d{2})"  $ymd;
        default                         "nodate";
    }

    # Tab-separated, 9 fields, in order:
    #   1 msec  2 remote_addr  3 method  4 status  5 body_bytes  6 upstream_bytes
    #   7 cache_status  8 request_time  9 request_uri
    #
    # $request_uri is the ORIGINAL, PRE-rewrite URI. $uri would be /pub/fedora/...
    # for every .rpm (conf.d/pkgcache.conf rewrites it) and would file every
    # Fedora package under a repo called "pub" while metadata classified fine --
    # a dashboard that looks 90% right while mis-bucketing the high-value traffic.
    # Measured 2026-07-18; see context/pitfalls.md. NEVER $uri.
    #
    # $upstream_bytes_received is what we actually paid upstream. It is "-" on a
    # HIT, and on a MISS it EXCEEDS $body_bytes_sent because it counts response
    # headers -- so "bytes saved" is a hit-class-only subtraction, never a
    # whole-window (served - upstream). See context/distilled.md.
    #
    # escape=default renders control characters as \xNN. The one variable-length,
    # client-controlled field is LAST, so a malformed one cannot shift any other.
    log_format stats escape=default
        '$msec\t$remote_addr\t$request_method\t$status\t'
        '$body_bytes_sent\t$upstream_bytes_received\t$upstream_cache_status\t'
        '$request_time\t$request_uri';

    # MANDATORY with a variable in the access_log path: without it nginx open()s
    # and close()s the log file on EVERY request. Also note the consequence for
    # log retention -- a worker keeps the fd for up to `valid` after the last
    # write, so the reader must never delete today's or yesterday's file.
    open_log_file_cache max=32 inactive=1m valid=1m min_uses=1;

    # BOTH stay at http level. access_log is inherited only when the current
    # level declares none, so putting either inside a server block would
    # silently drop the other. No buffer= -- nginx writes each line with a
    # single O_APPEND write(), which is atomic across workers; buffering would
    # risk losing lines on SIGKILL and open_log_file_cache already removed the
    # syscall cost it exists to solve.
    access_log /dev/stdout cache;
    access_log /logs/access-$logdate.log stats;

    sendfile      on;
    tcp_nopush    on;
    server_tokens off;

    # Keep every mutable path off the read-only image layers. One level under
    # the volume root so nginx's single-level mkdir() succeeds on a fresh mount.
    client_body_temp_path /var/cache/nginx/client_temp;
    proxy_temp_path       /var/cache/nginx/proxy_temp;
    fastcgi_temp_path     /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path       /var/cache/nginx/uwsgi_temp;
    scgi_temp_path        /var/cache/nginx/scgi_temp;

    # The package cache. Packages are immutable so a long inactive window is
    # safe; max_size caps disk use (edit here to taste). use_temp_path=off
    # writes straight into the cache tree to avoid a cross-device rename.
    proxy_cache_path /var/cache/nginx/pkg
        levels=1:2
        keys_zone=pkg:64m
        inactive=365d
        max_size=100g
        use_temp_path=off;

    # Resolver is needed because upstreams are proxied by hostname. 127.0.0.11
    # is the docker/podman embedded DNS; 1.1.1.1 is a fallback for host/bridge
    # networks where the embedded resolver is absent.
    resolver 127.0.0.11 1.1.1.1 valid=300s ipv6=off;
    resolver_timeout 5s;

    include /etc/nginx/conf.d/*.conf;
}
